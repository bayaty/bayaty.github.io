<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>bayaty</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#0d0d0d;
  --accent:#00ffff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:#fff;
  font-family:"Segoe UI",sans-serif;
  min-height:100vh;
  overflow:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
main{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
}
.gallery {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  max-width: 800px;
  width: 100%;
}
.image-container {
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  background: var(--bg);
  width: 100%;
  cursor: pointer;
  position: relative;
  height: 300px;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.image-container:hover {
  transform: scale(1.02);
  box-shadow: 0 0 35px rgba(0, 255, 255, 0.7);
}
.display-image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.image-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  color: #ff6666;
  padding: 1rem;
  text-align: center;
}
.error-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}
.error-text {
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
}
.error-hint {
  font-size: 0.7rem;
  color: #aaa;
}

/* Modal Styles */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  z-index: 100;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s ease;
}
.modal.show {
  display: flex;
}
.modal-content {
  max-width: 90%;
  max-height: 90%;
  position: relative;
}
.modal-image {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 8px;
}
.close-modal {
  position: absolute;
  top: -40px;
  right: 0;
  color: #f1f1f1;
  font-size: 30px;
  font-weight: bold;
  cursor: pointer;
  transition: color 0.3s ease;
}
.close-modal:hover {
  color: var(--accent);
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>
<main>
  <div class="gallery">
    <div class="image-container" data-src="1.png">
      <img src="1.png" alt="Image 1" class="display-image" onload="this.style.opacity=1;" onerror="this.onerror=null; this.parentElement.classList.add('error'); this.parentElement.innerHTML='<div class=\'image-error\'><div class=\'error-icon\'>⚠️</div><div class=\'error-text\'>Image not found: 1.png</div><div class=\'error-hint\'>Check if file exists in the same folder</div></div>'">
    </div>
    <div class="image-container" data-src="2.png">
      <img src="2.png" alt="Image 2" class="display-image" onload="this.style.opacity=1;" onerror="this.onerror=null; this.parentElement.classList.add('error'); this.parentElement.innerHTML='<div class=\'image-error\'><div class=\'error-icon\'>⚠️</div><div class=\'error-text\'>Image not found: 2.png</div><div class=\'error-hint\'>Check if file exists in the same folder</div></div>'">
    </div>
    <div class="image-container" data-src="3.png">
      <img src="3.png" alt="Image 3" class="display-image" onload="this.style.opacity=1;" onerror="this.onerror=null; this.parentElement.classList.add('error'); this.parentElement.innerHTML='<div class=\'image-error\'><div class=\'error-icon\'>⚠️</div><div class=\'error-text\'>Image not found: 3.png</div><div class=\'error-hint\'>Check if file exists in the same folder</div></div>'">
    </div>
    <div class="image-container" data-src="4.png">
      <img src="4.png" alt="Image 4" class="display-image" onload="this.style.opacity=1;" onerror="this.onerror=null; this.parentElement.classList.add('error'); this.parentElement.innerHTML='<div class=\'image-error\'><div class=\'error-icon\'>⚠️</div><div class=\'error-text\'>Image not found: 4.png</div><div class=\'error-hint\'>Check if file exists in the same folder</div></div>'">
    </div>
    <div class="image-container" data-src="5.png">
      <img src="5.png" alt="Image 5" class="display-image" onload="this.style.opacity=1;" onerror="this.onerror=null; this.parentElement.classList.add('error'); this.parentElement.innerHTML='<div class=\'image-error\'><div class=\'error-icon\'>⚠️</div><div class=\'error-text\'>Image not found: 5.png</div><div class=\'error-hint\'>Check if file exists in the same folder</div></div>'">
    </div>
    <div class="image-container" data-src="6.png">
      <img src="6.png" alt="Image 6" class="display-image" onload="this.style.opacity=1;" onerror="this.onerror=null; this.parentElement.classList.add('error'); this.parentElement.innerHTML='<div class=\'image-error\'><div class=\'error-icon\'>⚠️</div><div class=\'error-text\'>Image not found: 6.png</div><div class=\'error-hint\'>Check if file exists in the same folder</div></div>'">
    </div>
  </div>
</main>

<!-- Modal for full-screen image viewing -->
<div id="imageModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <img id="modalImage" class="modal-image" src="" alt="Maximized Image">
  </div>
</div>

<script>
// Get DOM elements
const modal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalImage');
const closeModal = document.querySelector('.close-modal');
const imageContainers = document.querySelectorAll('.image-container');
const images = Array.from(document.querySelectorAll('.image-container')).filter(container => !container.querySelector('.error'));

// Set initial opacity to 0 for fade-in effect
document.querySelectorAll('.display-image').forEach(img => {
  img.style.opacity = '0';
  img.style.transition = 'opacity 0.3s ease';
});

// Add click events to all image containers
imageContainers.forEach(container => {
  container.addEventListener('click', function() {
    // Skip if there's an error
    if (this.querySelector('.image-error')) {
      return;
    }

    const imgSrc = this.getAttribute('data-src');
    modalImg.src = imgSrc;
    modal.classList.add('show');
  });
});

// Close modal when clicking the close button
closeModal.addEventListener('click', function() {
  modal.classList.remove('show');
});

// Close modal when clicking outside the image
modal.addEventListener('click', function(e) {
  if (e.target === modal) {
    modal.classList.remove('show');
  }
});

// Get current index of the displayed image
function getCurrentImageIndex() {
  return images.findIndex(container => container.getAttribute('data-src') === modalImg.src.split('/').pop());
}

// Navigate to next image
function showNextImage() {
  const currentIndex = getCurrentImageIndex();
  if (currentIndex < images.length - 1) {
    modalImg.src = images[currentIndex + 1].getAttribute('data-src');
  }
}

// Navigate to previous image
function showPreviousImage() {
  const currentIndex = getCurrentImageIndex();
  if (currentIndex > 0) {
    modalImg.src = images[currentIndex - 1].getAttribute('data-src');
  }
}

// Handle keyboard navigation
document.addEventListener('keydown', function(e) {
  // If modal is not open, handle escape key only
  if (!modal.classList.contains('show')) {
    if (e.key === 'Escape') {
      modal.classList.remove('show');
    }
    return;
  }

  // If modal is open, handle all navigation keys
  if (e.key === 'Escape') {
    modal.classList.remove('show');
  } else if (e.key === 'ArrowRight') {
    showNextImage();
  } else if (e.key === 'ArrowLeft') {
    showPreviousImage();
  }
});
</script>
</body>
</html>
